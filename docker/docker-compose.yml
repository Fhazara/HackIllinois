# ─────────────────────────────────────────────────────────────
#  Thrift Product Search Agent — Docker Compose
# ─────────────────────────────────────────────────────────────
services:
  openclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thrift-product-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      # OpenClaw model config (Gemini)
      - OPENCLAW_MODEL=gemini-2.0-flash
      - OPENCLAW_MODEL_PROVIDER=google
      # Python venv on PATH
      - PATH=/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      # Persist agent data (conversations, session state, etc.)
      - openclaw_data:/home/node/.openclaw
      # Mount skills for live editing during development
      - ./skills:/home/node/.openclaw/workspace/skills:ro
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:18789/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  openclaw_data:
    driver: local
